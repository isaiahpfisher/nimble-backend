name: AWS DEPLOY (DOCKER)

# Builds the backend image, pushes it to ECR, and (re)deploys the
# containerized stack on the EC2 instance via docker compose.
on:
  pull_request:
    types: [closed]
    branches:
      - dev

jobs:
  deploy:
    # only run when the PR was actually merged, not just closed
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: nimble-backend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      # --- Authenticate to AWS / ECR (simplest: IAM access keys) ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- Build & push the backend image ---
      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
                       -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      # --- Copy the prod compose file to the instance ---
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.prod.yml
          target: nimble

      # --- Deploy: write .env, log in to ECR (instance IAM role), pull, up ---
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: REGISTRY
          script: |
            cd ~/nimble
            cat > .env <<EOF
            BACKEND_IMAGE=${REGISTRY}/nimble-backend:latest
            FRONTEND_IMAGE=${REGISTRY}/nimble-frontend:latest
            DB_HOST=${{ secrets.PROD_DB_HOST }}
            DB_PORT=${{ secrets.PROD_DB_PORT }}
            DB_NAME=${{ secrets.PROD_DB_NAME }}
            DB_USER=${{ secrets.PROD_DB_USER }}
            DB_PW=${{ secrets.PROD_DB_PW }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            CORS_ORIGIN=http://${{ secrets.REMOTE_HOST }}
            EOF
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin "$REGISTRY"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
