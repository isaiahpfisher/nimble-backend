name: PROTECT MAIN

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is dev
        if: github.head_ref != 'dev'
        run: |
          echo "ERROR: Merges into 'main' are only allowed from the 'dev' branch."
          echo "Current source branch: ${{ github.head_ref }}"
          exit 1
