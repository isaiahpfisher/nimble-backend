# Production stack for the EC2 instance.
# Differences from docker-compose.yml (local):
#   - No `db` service: the database is RDS Postgres (managed, external).
#   - Images are PULLED from ECR, not built here.
#   - Backend port is internal only; only the frontend is exposed (:80).
# All values come from a .env file placed next to this file on the instance
# (written by the GitHub Action from repo secrets).
name: nimble
services:
  backend:
    image: ${BACKEND_IMAGE} # e.g. <acct>.dkr.ecr.<region>.amazonaws.com/nimble-backend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3200
      DB_DIALECT: postgres
      DB_HOST: ${DB_HOST} # RDS endpoint
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PW: ${DB_PW}
      DB_SSL: "true"
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN} # public site URL (belt-and-suspenders; proxy is same-origin)
    expose:
      - "3200" # visible to the frontend container only, NOT the host/internet

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
